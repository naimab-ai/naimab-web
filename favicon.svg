<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" role="img" aria-labelledby="title">
  <title>Naimab</title>
  <!--
    The old favicon was drawn on a 32px grid, then crushed down to 16px in tabs.
    That pushed the stems and diagonal onto half-pixels, which is why the "N"
    looked muddy. This version is authored directly on a 16px grid.
  -->
  <rect width="16" height="16" rx="3" fill="#2b180a"/>
  <g fill="#fcf6ef" shape-rendering="crispEdges">
    <rect x="2" y="2" width="3" height="12"/>
    <rect x="11" y="2" width="3" height="12"/>
    <rect x="4" y="2" width="3" height="2"/>
    <rect x="5" y="4" width="3" height="2"/>
    <rect x="6" y="6" width="3" height="2"/>
    <rect x="7" y="8" width="3" height="2"/>
    <rect x="8" y="10" width="3" height="2"/>
    <rect x="9" y="12" width="3" height="2"/>
  </g>
</svg>
